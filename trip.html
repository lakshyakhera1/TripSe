<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip - TripSe</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg-deep: #0c0a1f;
    --bg-mid: #1b1440;
    --card: rgba(255,255,255,0.055);
    --card-border: rgba(255,255,255,0.13);
    --text: #f4f2ff;
    --text-dim: #a79fd6;
    --text-faint: #6e6699;
    --gold: #ffc555;
    --coral: #ff5d8f;
    --violet: #9d7bff;
    --teal: #45e0c4;
    --offline: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body{
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header{
    background: rgba(12,10,31,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-left{ display: flex; align-items: center; gap: 16px; }
  .trip-code{
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
  }
  .header-right{ display: flex; gap: 12px; }
  .btn{
    background: linear-gradient(135deg, var(--teal), var(--violet));
    color: #0c0a1f;
    border: none;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn-danger{
    background: linear-gradient(135deg, var(--coral), #ff4081);
  }

  .map-container{ flex: 1; position: relative; }
  #map{ width: 100%; height: 100%; }

  .members-panel{
    position: absolute;
    bottom: 0;
    right: 0;
    width: 320px;
    max-height: 50%;
    background: rgba(12,10,31,0.95);
    border: 1px solid rgba(255,255,255,0.13);
    border-bottom-right-radius: 0;
    border-top-left-radius: 16px;
    overflow-y: auto;
    z-index: 50;
  }
  .members-head{
    padding: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-weight: 600;
    font-size: 14px;
    position: sticky;
    top: 0;
    background: rgba(12,10,31,0.98);
    z-index: 10;
  }
  .member-item{
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.2s ease;
  }
  .member-item:hover{
    background: rgba(255,255,255,0.03);
  }
  .member-info{ flex: 1; }
  .member-name{ 
    font-size: 13px; 
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .member-badge{ 
    font-family: 'JetBrains Mono', monospace; 
    font-size: 10px; 
    color: var(--text-faint); 
    margin-top: 2px;
  }
  .status-dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-online{ background: var(--teal); box-shadow: 0 0 8px var(--teal); }
  .status-offline{ background: var(--offline); }
  .member-actions{ display: flex; gap: 6px; }
  .member-actions button{
    background: rgba(69,224,196,0.2);
    border: 1px solid rgba(69,224,196,0.4);
    color: var(--teal);
    font-size: 11px;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .member-actions button:hover{ 
    background: rgba(69,224,196,0.3);
    transform: scale(1.05);
  }
  .member-actions button:disabled{
    opacity: 0.4;
    cursor: not-allowed;
  }

  .weather-widget{
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(12,10,31,0.95);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 500;
    font-size: 13px;
    min-width: 160px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .weather-temp{ font-size: 22px; font-weight: 700; color: var(--gold); }
  .weather-desc{ color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .weather-loc{ color: var(--text-faint); font-size: 10px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

  .error-toast{
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,93,143,0.95);
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    z-index: 1000;
    display: none;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown {
    from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
    to { transform: translateX(-50%) translateY(0); opacity: 1; }
  }

  /* Custom marker labels */
  .member-label{
    background: rgba(12,10,31,0.9);
    border: 1px solid rgba(255,255,255,0.2);
    color: var(--text);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .member-label.me{
    background: rgba(69,224,196,0.2);
    border-color: var(--teal);
    color: var(--teal);
  }

  /* Custom popup buttons */
  .popup-content{
    min-width: 180px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  .popup-name{
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
    color: var(--gold);
  }
  .popup-status{
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .popup-buttons{
    display: flex;
    gap: 6px;
  }
  .popup-btn{
    flex: 1;
    background: linear-gradient(135deg, var(--teal), var(--violet));
    color: #0c0a1f;
    border: none;
    font-weight: 700;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .popup-btn:hover{ transform: translateY(-1px); }
  .popup-btn:disabled{
    opacity: 0.4;
    cursor: not-allowed;
    background: rgba(255,255,255,0.1);
    color: var(--text-faint);
  }
  .popup-no-phone{
    font-size: 11px;
    color: var(--text-faint);
    font-style: italic;
    padding: 6px 0;
  }

  @media (max-width: 768px){
    .members-panel{ 
      width: 100%; 
      max-height: 40%; 
      border-radius: 16px 16px 0 0;
    }
    .member-actions button{
      padding: 8px 12px;
      font-size: 12px;
    }
    header{ padding: 12px 16px; }
    .trip-code{ font-size: 12px; }
    .btn{ padding: 8px 14px; font-size: 12px; }
    .weather-widget{
      top: 10px;
      left: 10px;
      padding: 10px 14px;
      min-width: 140px;
    }
    .weather-temp{ font-size: 18px; }
  }

  .leaflet-popup-content-wrapper{ 
    background: rgba(12,10,31,0.98) !important; 
    border: 1px solid rgba(255,255,255,0.15) !important; 
    border-radius: 12px !important;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important;
  }
  .leaflet-popup-content{ 
    margin: 14px 16px !important;
  }
  .leaflet-popup-tip{ background: rgba(12,10,31,0.98) !important; }
  .leaflet-popup-close-button{
    color: var(--text-dim) !important;
  }
  
  .leaflet-control-zoom{
    border: 1px solid rgba(255,255,255,0.13) !important;
  }
  .leaflet-control-zoom a{
    background: rgba(12,10,31,0.9) !important;
    color: var(--text) !important;
    border-bottom: 1px solid rgba(255,255,255,0.13) !important;
  }
  .leaflet-control-zoom a:hover{
    background: rgba(27,20,64,0.9) !important;
  }

  .leaflet-control-layers{
    background: rgba(12,10,31,0.9) !important;
    border: 1px solid rgba(255,255,255,0.13) !important;
    color: var(--text) !important;
  }
  .leaflet-control-layers label{
    color: var(--text) !important;
    font-size: 12px !important;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="trip-code" id="tripCodeDisplay"></div>
  </div>
  <div class="header-right">
    <button class="btn" id="shareBtn">Share</button>
    <button class="btn btn-danger" id="endTripBtn" style="display:none;">End Trip</button>
  </div>
</header>

<div class="map-container">
  <div id="map"></div>
  <div class="weather-widget" id="weatherWidget">
    <div class="weather-temp" id="weatherTemp">--°C</div>
    <div class="weather-desc" id="weatherDesc">Loading weather...</div>
    <div class="weather-loc" id="weatherLoc">📍 Detecting...</div>
  </div>
  <div class="members-panel" id="membersPanel">
    <div class="members-head">Members (<span id="memberCount">0</span>)</div>
    <div id="membersList"></div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-check-compat.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" defer></script>
<script defer>
const RECAPTCHA_SITE_KEY = 'YOUR_RECAPTCHA_SITE_KEY';

let map;
let markers = {};
let labels = {};
let userMarker;
let db;
let tripCode;
let memberId;
let isHost = false;
let mapCentered = false;
let membersListener = null;
let tripStatusListener = null;
let lastUserLocation = null;

// Color palette for members
const MEMBER_COLORS = [
  '#ffc555', '#ff5d8f', '#9d7bff', '#ff9f43', 
  '#54a0ff', '#5f27cd', '#01a3a4', '#ee5a6f',
  '#c44569', '#f8b500', '#6ab04c', '#eb4d4b'
];

function getColorForMember(mId){
  if (mId === memberId) return '#45e0c4'; // My color always teal
  let hash = 0;
  for (let i = 0; i < mId.length; i++) {
    hash = mId.charCodeAt(i) + ((hash << 5) - hash);
  }
  return MEMBER_COLORS[Math.abs(hash) % MEMBER_COLORS.length];
}

function showError(message) {
  const toast = document.getElementById('errorToast');
  toast.textContent = message;
  toast.style.display = 'block';
  setTimeout(() => { toast.style.display = 'none'; }, 4000);
}

function initTrip(){
  const firebaseConfig = {
    apiKey: "AIzaSyClUa_Q7nU0yNuFJZ2s53cECH53GL_Q7G8",
    authDomain: "tripse-1bc73.firebaseapp.com",
    databaseURL: "https://tripse-1bc73-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tripse-1bc73",
    storageBucket: "tripse-1bc73.firebasestorage.app",
    messagingSenderId: "410824984177",
    appId: "1:410824984177:web:60a56a9f86e2f017c8fdd0"
  };
  
  try {
    firebase.initializeApp(firebaseConfig);
    try { firebase.appCheck().activate(RECAPTCHA_SITE_KEY, false); } catch(e) {}
    db = firebase.database();
    firebase.auth().signInAnonymously().catch(err => {
      console.error('Auth error:', err);
      showError('Authentication failed. Please refresh.');
    });
  } catch (error) {
    showError('Failed to connect to server.');
    return;
  }

  const urlParams = new URLSearchParams(window.location.search);
  tripCode = urlParams.get('code');

  if (!tripCode) {
    showError('Invalid trip access. Redirecting...');
    setTimeout(() => { window.location.href = '/'; }, 2000);
    return;
  }

  firebase.auth().onAuthStateChanged((user) => {
    if (user) {
      memberId = user.uid;
      isHost = localStorage.getItem('trip_' + tripCode + '_isHost') === 'true';

      document.getElementById('tripCodeDisplay').textContent = 'Trip: ' + tripCode;
      if (isHost) document.getElementById('endTripBtn').style.display = 'block';

      window.memberId = memberId;
      initMap();
      updateUserLocation();
      loadMembers();
      listenToTripStatus();
    }
  });
}

function initMap(){
  try {
    map = L.map('map', {
      zoomControl: true,
      attributionControl: true
    }).setView([20, 78], 5);
    
    // Satellite layer (default)
    const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '© Esri',
      maxZoom: 19
    });
    
    // Street layer
    const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    });
    
    // Terrain layer
    const terrainLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenTopoMap',
      maxZoom: 17
    });
    
    // Add satellite by default
    satelliteLayer.addTo(map);
    
    const baseLayers = {
      "🛰️ Satellite": satelliteLayer,
      "🗺️ Street Map": streetLayer,
      "⛰️ Terrain": terrainLayer
    };
    
    L.control.layers(baseLayers, null, {
      position: 'topright',
      collapsed: true
    }).addTo(map);
    
  } catch (error) {
    console.error('Map init error:', error);
    showError('Failed to load map.');
  }
}

function updateUserLocation(){
  if (!navigator.geolocation) {
    showError('Geolocation not supported.');
    // Use default location for weather
    fetchWeather(28.6139, 77.2090, 'New Delhi (default)');
    return;
  }

  const watchOptions = {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  };

  let weatherFetched = false;

  const watchId = navigator.geolocation.watchPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      lastUserLocation = { lat, lng };
      
      db.ref('trips/' + tripCode + '/members/' + memberId).update({
        lat: lat,
        lng: lng,
        updatedAt: firebase.database.ServerValue.TIMESTAMP,
        online: true
      }).catch(err => {
        console.error('Location update error:', err);
      });

      // Fetch weather on first location
      if (!weatherFetched) {
        weatherFetched = true;
        fetchWeather(lat, lng, 'Your location');
      }

      if (!userMarker) {
        userMarker = L.circleMarker([lat, lng], {
          radius: 11,
          fillColor: '#45e0c4',
          color: '#ffffff',
          weight: 3,
          opacity: 1,
          fillOpacity: 0.95
        }).addTo(map);
        
        if (!mapCentered) {
          map.setView([lat, lng], 15);
          mapCentered = true;
        }
      } else {
        userMarker.setLatLng([lat, lng]);
      }
    },
    (err) => {
      console.error('Geolocation error:', err);
      let errorMsg = 'Location error: ';
      switch(err.code) {
        case 1: errorMsg += 'Permission denied.'; break;
        case 2: errorMsg += 'Position unavailable.'; break;
        case 3: errorMsg += 'Timeout.'; break;
        default: errorMsg += 'Unknown error.';
      }
      showError(errorMsg);
      
      // Fallback weather with default location
      if (!weatherFetched) {
        weatherFetched = true;
        fetchWeather(28.6139, 77.2090, 'New Delhi (default)');
      }
      
      db.ref('trips/' + tripCode + '/members/' + memberId).update({
        online: false,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });
    },
    watchOptions
  );

  window.addEventListener('beforeunload', () => {
    navigator.geolocation.clearWatch(watchId);
    db.ref('trips/' + tripCode + '/members/' + memberId).update({
      online: false,
      updatedAt: firebase.database.ServerValue.TIMESTAMP
    });
  });
}

function createPopupContent(mId, name, phone, isOnline, isMe){
  const statusText = isOnline ? '🟢 Online' : '⚫ Offline';
  const youTag = isMe ? ' (You)' : '';
  
  let buttonsHtml = '';
  if (phone) {
    buttonsHtml = `
      <div class="popup-buttons">
        <button class="popup-btn" onclick="callMember('${name.replace(/'/g, "\\'")}', '${phone}')">📞 Call</button>
        <button class="popup-btn" onclick="messageMember('${name.replace(/'/g, "\\'")}', '${phone}')">💬 Msg</button>
      </div>
    `;
  } else {
    buttonsHtml = `<div class="popup-no-phone">📱 No phone shared</div>`;
  }
  
  return `
    <div class="popup-content">
      <div class="popup-name">${name}${youTag}</div>
      <div class="popup-status">${statusText}</div>
      ${buttonsHtml}
    </div>
  `;
}

function addOrUpdateMarker(mId, data, name){
  if (!data.lat || !data.lng) {
    if (markers[mId]) {
      markers[mId].remove();
      delete markers[mId];
    }
    if (labels[mId]) {
      labels[mId].remove();
      delete labels[mId];
    }
    return;
  }

  const isMe = mId === memberId;
  const isOnline = data.online !== false && 
                   data.updatedAt && 
                   (Date.now() - data.updatedAt < 30000);
  const color = getColorForMember(mId);
  const phone = data.phone || '';

  if (markers[mId]) {
    markers[mId].setLatLng([data.lat, data.lng]);
    markers[mId].setStyle({
      fillColor: isOnline ? color : '#666',
      color: isMe ? '#ffffff' : (isOnline ? color : '#444'),
      opacity: isOnline ? 1 : 0.5,
      fillOpacity: isOnline ? 0.9 : 0.4
    });
    markers[mId].setPopupContent(createPopupContent(mId, name, phone, isOnline, isMe));
  } else {
    const marker = L.circleMarker([data.lat, data.lng], {
      radius: isMe ? 12 : 10,
      fillColor: isOnline ? color : '#666',
      color: isMe ? '#ffffff' : (isOnline ? color : '#444'),
      weight: isMe ? 3 : 2,
      opacity: isOnline ? 1 : 0.5,
      fillOpacity: isOnline ? 0.9 : 0.4
    }).addTo(map);
    
    marker.bindPopup(createPopupContent(mId, name, phone, isOnline, isMe));
    markers[mId] = marker;
  }

  // Update label
  if (labels[mId]) {
    labels[mId].setLatLng([data.lat, data.lng]);
  } else {
    const labelIcon = L.divIcon({
      className: '',
      html: `<div class="member-label ${isMe ? 'me' : ''}" style="border-color:${color}">${name}${isMe ? ' (You)' : ''}</div>`,
      iconSize: [null, null],
      iconAnchor: [0, -20]
    });
    const label = L.marker([data.lat, data.lng], {
      icon: labelIcon,
      interactive: false,
      keyboard: false
    }).addTo(map);
    labels[mId] = label;
  }
}

function fetchWeather(lat, lng, locationLabel){
  document.getElementById('weatherLoc').textContent = '📍 ' + locationLabel;
  
  fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,rain,wind_speed_10m`)
    .then(r => {
      if (!r.ok) throw new Error('API error: ' + r.status);
      return r.json();
    })
    .then(data => {
      if (data && data.current) {
        const temp = Math.round(data.current.temperature_2m);
        const isRaining = data.current.rain > 0;
        const weatherCode = data.current.weather_code;
        
        let weatherDesc = '☀️ Clear';
        let emoji = '☀️';
        
        if (isRaining) {
          weatherDesc = '🌧️ Rain alert!';
          emoji = '🌧️';
        } else if (weatherCode === 0) {
          weatherDesc = '☀️ Clear sky';
        } else if (weatherCode >= 1 && weatherCode <= 3) {
          weatherDesc = '⛅ Partly cloudy';
        } else if (weatherCode >= 45 && weatherCode <= 48) {
          weatherDesc = '🌫️ Foggy';
        } else if (weatherCode >= 51 && weatherCode <= 67) {
          weatherDesc = '🌧️ Drizzle/Rain';
        } else if (weatherCode >= 71 && weatherCode <= 77) {
          weatherDesc = '🌨️ Snow';
        } else if (weatherCode >= 80 && weatherCode <= 82) {
          weatherDesc = '🌦️ Showers';
        } else if (weatherCode >= 95) {
          weatherDesc = '⛈️ Thunderstorm';
        }
        
        document.getElementById('weatherTemp').textContent = temp + '°C';
        document.getElementById('weatherDesc').textContent = weatherDesc;
        document.getElementById('weatherWidget').style.display = 'block';
      }
    })
    .catch(e => {
      console.error('Weather fetch error:', e);
      document.getElementById('weatherTemp').textContent = '--°C';
      document.getElementById('weatherDesc').textContent = 'Weather unavailable';
      document.getElementById('weatherWidget').style.display = 'block';
    });
}

function loadMembers(){
  if (membersListener) {
    db.ref('trips/' + tripCode + '/members').off('value', membersListener);
  }

  let previousMembers = {};

  membersListener = db.ref('trips/' + tripCode + '/members').on('value', 
    (snap) => {
      const members = snap.val() || {};
      const list = document.getElementById('membersList');
      const memberEntries = Object.entries(members);
      document.getElementById('memberCount').textContent = memberEntries.length;

      const currentMemberIds = new Set(memberEntries.map(([id]) => id));

      // Remove members who left
      Object.keys(previousMembers).forEach(mId => {
        if (!currentMemberIds.has(mId)) {
          const oldItem = document.getElementById('member-' + mId);
          if (oldItem) oldItem.remove();
          if (markers[mId]) {
            markers[mId].remove();
            delete markers[mId];
          }
          if (labels[mId]) {
            labels[mId].remove();
            delete labels[mId];
          }
        }
      });

      // Add or update members
      memberEntries.forEach(([mId, data]) => {
        const name = data.name || 'Unknown';
        const isMe = mId === memberId;
        const phone = data.phone || '';
        const isOnline = data.online !== false && 
                        data.updatedAt && 
                        (Date.now() - data.updatedAt < 30000);
        const color = getColorForMember(mId);

        let item = document.getElementById('member-' + mId);

        if (!item) {
          item = document.createElement('div');
          item.id = 'member-' + mId;
          item.className = 'member-item';
          list.appendChild(item);
        }

        item.innerHTML = `
          <div class="member-info">
            <div class="member-name">
              <span class="status-dot ${isOnline ? 'status-online' : 'status-offline'}" style="${isOnline ? 'background:'+color+';box-shadow:0 0 8px '+color : ''}"></span>
              ${name}${isMe ? ' (you)' : ''}
            </div>
            <div class="member-badge">${isOnline ? 'Online' : 'Offline'}</div>
          </div>
          <div class="member-actions">
            <button onclick="callMember('${name.replace(/'/g, "\\'")}', '${phone}')" ${!phone ? 'disabled' : ''}>📞</button>
            <button onclick="messageMember('${name.replace(/'/g, "\\'")}', '${phone}')" ${!phone ? 'disabled' : ''}>💬</button>
          </div>
        `;
        
        addOrUpdateMarker(mId, data, name);
      });

      previousMembers = {...members};
    },
    (error) => {
      console.error('Members listener error:', error);
      showError('Failed to load members.');
    }
  );
}

function listenToTripStatus(){
  if (tripStatusListener) {
    db.ref('trips/' + tripCode).off('value', tripStatusListener);
  }

  tripStatusListener = db.ref('trips/' + tripCode).on('value', 
    (snap) => {
      const trip = snap.val();
      if (trip && trip.ended === true) {
        showError('Trip ended by host. Redirecting...');
        if (membersListener) db.ref('trips/' + tripCode + '/members').off('value', membersListener);
        setTimeout(() => { window.location.href = '/'; }, 2000);
      }
    },
    (error) => {
      console.error('Trip status listener error:', error);
    }
  );
}

function callMember(name, phone){
  if (!phone) {
    showError(`${name} has not shared phone number.`);
    return;
  }
  window.location.href = 'tel:' + phone;
}

function messageMember(name, phone){
  if (!phone) {
    showError(`${name} has not shared phone number.`);
    return;
  }
  window.location.href = 'sms:' + phone;
}

// Make functions global for popup onclick
window.callMember = callMember;
window.messageMember = messageMember;

document.getElementById('shareBtn').addEventListener('click', () => {
  const link = window.location.href;
  if (navigator.share) {
    navigator.share({ 
      title: 'Join my trip on TripSe', 
      text: 'Track our trip in real-time!',
      url: link 
    }).catch(() => {});
  } else {
    prompt('Copy this link to share:', link);
  }
});

document.getElementById('endTripBtn').addEventListener('click', () => {
  if (!confirm('End this trip for everyone?')) return;
  
  db.ref('trips/' + tripCode).update({ 
    ended: true,
    endedAt: firebase.database.ServerValue.TIMESTAMP
  }).then(() => {
    showError('Trip ended. Redirecting...');
    if (membersListener) db.ref('trips/' + tripCode + '/members').off('value', membersListener);
    if (tripStatusListener) db.ref('trips/' + tripCode).off('value', tripStatusListener);
    setTimeout(() => { window.location.href = '/'; }, 2000);
  }).catch(err => {
    showError('Failed to end trip.');
  });
});

document.addEventListener('DOMContentLoaded', () => {
  if (typeof firebase !== 'undefined' && typeof L !== 'undefined') {
    initTrip();
  } else {
    let attempts = 0;
    const checkInterval = setInterval(() => {
      attempts++;
      if (typeof firebase !== 'undefined' && typeof L !== 'undefined') {
        clearInterval(checkInterval);
        initTrip();
      } else if (attempts > 50) {
        clearInterval(checkInterval);
        showError('Failed to load libraries. Please refresh.');
      }
    }, 100);
  }
});
</script>
