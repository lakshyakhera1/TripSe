<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip - TripSe</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --bg-deep: #0c0a1f;
    --bg-mid: #1b1440;
    --card: rgba(255,255,255,0.055);
    --card-border: rgba(255,255,255,0.13);
    --text: #f4f2ff;
    --text-dim: #a79fd6;
    --text-faint: #6e6699;
    --gold: #ffc555;
    --coral: #ff5d8f;
    --violet: #9d7bff;
    --teal: #45e0c4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body{
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header{
    background: rgba(12,10,31,0.8);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
  }
  .header-left{ display: flex; align-items: center; gap: 16px; }
  .trip-code{
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
  }
  .header-right{ display: flex; gap: 12px; }
  .btn{
    background: linear-gradient(135deg, var(--teal), var(--violet));
    color: #0c0a1f;
    border: none;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn-danger{
    background: linear-gradient(135deg, var(--coral), #ff4081);
  }

  .map-container{ flex: 1; position: relative; }
  #map{ width: 100%; height: 100%; }

  .members-panel{
    position: absolute;
    bottom: 0;
    right: 0;
    width: 320px;
    max-height: 50%;
    background: rgba(12,10,31,0.95);
    border: 1px solid rgba(255,255,255,0.13);
    border-bottom-right-radius: 0;
    border-top-left-radius: 16px;
    overflow-y: auto;
    z-index: 50;
  }
  .members-head{
    padding: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-weight: 600;
    font-size: 14px;
  }
  .member-item{
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .member-name{ font-size: 13px; }
  .member-badge{ font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); }
  .member-actions{ display: flex; gap: 6px; }
  .member-actions button{
    background: rgba(69,224,196,0.2);
    border: 1px solid rgba(69,224,196,0.4);
    color: var(--teal);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
  }
  .member-actions button:hover{ background: rgba(69,224,196,0.3); }

  .weather-widget{
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(12,10,31,0.9);
    border: 1px solid rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 12px 16px;
    z-index: 50;
    font-size: 13px;
  }
  .weather-temp{ font-size: 18px; font-weight: 700; }
  .weather-desc{ color: var(--text-dim); font-size: 12px; }

  @media (max-width: 768px){
    .members-panel{ width: 100%; max-height: 40%; border-radius: 16px 16px 0 0; }
  }

  .leaflet-popup-content-wrapper{ background: rgba(12,10,31,0.95); border: 1px solid rgba(255,255,255,0.13); }
  .leaflet-popup-content{ color: var(--text); font-size: 12px; }
  .leaflet-popup-tip{ background: rgba(12,10,31,0.95); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="trip-code" id="tripCodeDisplay"></div>
  </div>
  <div class="header-right">
    <button class="btn" id="shareBtn">Share</button>
    <button class="btn btn-danger" id="endTripBtn" style="display:none;">End Trip</button>
  </div>
</header>

<div class="map-container">
  <div id="map"></div>
  <div class="weather-widget" id="weatherWidget" style="display:none;">
    <div class="weather-temp" id="weatherTemp"></div>
    <div class="weather-desc" id="weatherDesc"></div>
  </div>
  <div class="members-panel" id="membersPanel">
    <div class="members-head">Members (<span id="memberCount">0</span>)</div>
    <div id="membersList"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" defer></script>
<script defer>
  function initTrip(){
    const firebaseConfig = {
    apiKey: "AIzaSyClUa_Q7nU0yNuFJZ2s53cECH53GL_Q7G8",
    authDomain: "tripse-1bc73.firebaseapp.com",
    databaseURL: "https://tripse-1bc73-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tripse-1bc73",
    storageBucket: "tripse-1bc73.firebasestorage.app",
    messagingSenderId: "410824984177",
    appId: "1:410824984177:web:60a56a9f86e2f017c8fdd0"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const urlParams = new URLSearchParams(window.location.search);
  const tripCode = urlParams.get('code');
  const memberId = localStorage.getItem('trip_' + tripCode + '_memberId');
  const isHost = localStorage.getItem('trip_' + tripCode + '_isHost') === 'true';

  if (!tripCode || !memberId) {
    alert('Invalid trip access.');
    window.location.href = '/';
  }

  document.getElementById('tripCodeDisplay').textContent = 'Trip: ' + tripCode;
  if (isHost) document.getElementById('endTripBtn').style.display = 'block';

  let map;
  let markers = {};
  let userMarker;

  function initMap(){
    map = L.map('map').setView([20, 78], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);
  }

  function updateUserLocation(){
    if (!navigator.geolocation) {
      alert('Geolocation not available.');
      return;
    }
    navigator.geolocation.watchPosition((pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      
      db.ref('trips/' + tripCode + '/members/' + memberId).update({
        lat: lat,
        lng: lng,
        updatedAt: firebase.database.ServerValue.TIMESTAMP
      });

      if (!userMarker) {
        userMarker = L.circleMarker([lat, lng], {
          radius: 8,
          fillColor: '#45e0c4',
          color: '#45e0c4',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.8
        }).addTo(map);
      } else {
        userMarker.setLatLng([lat, lng]);
      }
      
      map.setView([lat, lng], map.getZoom());
    }, (err) => {
      console.error('Geolocation error:', err);
    }, {
      enableHighAccuracy: true,
      timeout: 5000,
      maximumAge: 0
    });
  }

  function addOrUpdateMarker(memberId, data, name){
    if (!data.lat || !data.lng) return;

    if (markers[memberId]) {
      markers[memberId].setLatLng([data.lat, data.lng]);
    } else {
      const color = memberId === window.memberId ? '#45e0c4' : '#ffc555';
      const marker = L.circleMarker([data.lat, data.lng], {
        radius: 8,
        fillColor: color,
        color: color,
        weight: 2,
        opacity: 1,
        fillOpacity: 0.8
      }).addTo(map).bindPopup(name);
      markers[memberId] = marker;
    }
  }

  function fetchWeather(lat, lng){
    const apiKey = 'demo';
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,rain`)
      .then(r => r.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const isRaining = data.current.rain > 0;
        document.getElementById('weatherTemp').textContent = temp + '°C';
        document.getElementById('weatherDesc').textContent = isRaining ? '🌧️ Rain alert!' : 'Dry conditions';
        document.getElementById('weatherWidget').style.display = 'block';
      })
      .catch(e => console.error('Weather fetch error:', e));
  }

  function loadMembers(){
    db.ref('trips/' + tripCode + '/members').on('value', (snap) => {
      const members = snap.val() || {};
      const list = document.getElementById('membersList');
      list.innerHTML = '';
      document.getElementById('memberCount').textContent = Object.keys(members).length;

      Object.entries(members).forEach(([mId, data]) => {
        const name = data.name || 'Unknown';
        const isMe = mId === memberId;
        
        const item = document.createElement('div');
        item.className = 'member-item';
        item.innerHTML = `
          <div>
            <div class="member-name">${name}${isMe ? ' (you)' : ''}</div>
            <div class="member-badge">${mId.slice(0, 6)}</div>
          </div>
          <div class="member-actions">
            <button onclick="callMember('${name}')">Call</button>
            <button onclick="messageMember('${name}')">Msg</button>
          </div>
        `;
        list.appendChild(item);
        
        addOrUpdateMarker(mId, data, name);
      });
    });
  }

  function callMember(name){
    const tel = prompt(`Phone number for ${name}:`);
    if (tel) window.location.href = 'tel:' + tel;
  }

  function messageMember(name){
    const num = prompt(`Phone number for ${name}:`);
    if (num) window.location.href = 'sms:' + num;
  }

  document.getElementById('shareBtn').addEventListener('click', () => {
    const link = window.location.href;
    if (navigator.share) {
      navigator.share({ title: 'Join my trip', url: link });
    } else {
      prompt('Share this link:', link);
    }
  });

  document.getElementById('endTripBtn').addEventListener('click', () => {
    if (!confirm('End this trip for everyone?')) return;
    db.ref('trips/' + tripCode).update({ ended: true }).then(() => {
      alert('Trip ended.');
      window.location.href = '/';
    });
  });

    window.memberId = memberId;
    initMap();
    updateUserLocation();
    loadMembers();

    setTimeout(() => {
      navigator.geolocation.getCurrentPosition((pos) => {
        fetchWeather(pos.coords.latitude, pos.coords.longitude);
      });
    }, 1000);
  }
  
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof firebase !== 'undefined' && typeof L !== 'undefined') {
      initTrip();
    } else {
      setTimeout(() => initTrip(), 200);
    }
  });
</script>

</body>
</html>
